<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>✨ きょうのミッション ✨</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ミッション"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#ff7eb3"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#ff7eb3;--pink2:#ffb3d1;--purple:#c97ef7;
  --yellow:#ffe066;--mint:#7ee8c8;--bg:#fff0f8;
  --orange:#fdcb6e;--blue:#74b9ff;--navy:#1a6fa8;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);min-height:100vh;
  overflow-x:hidden;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;animation:floatStar linear infinite;opacity:.45;}
@keyframes floatStar{
  0%  {transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%,90%{opacity:.45;}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

/* ═══ アプリシェル ═══ */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── 固定ヘッダー（タブ＋進捗） ── */
.sticky-header{
  position:sticky;top:0;z-index:50;
  background:#fff;
  box-shadow:0 2px 14px rgba(255,126,179,.13);
  flex-shrink:0;
}

/* タブバー */
.tab-bar{
  display:flex;
  border-bottom:2.5px solid var(--pink2);
}
.tab-btn{
  flex:1;padding:11px 8px 9px;border:none;background:transparent;
  font-family:'Noto Sans JP',sans-serif;font-size:.8rem;font-weight:700;
  letter-spacing:.05em;color:#c097d0;cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2.5px;
  transition:color .2s,border-color .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab-btn .tab-icon{font-size:1.15rem;}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink);}

/* スタック進捗バー */
.sticky-progress{
  padding:7px 16px 8px;
  background:#fff;
}
/* スマホ：1本 / PC：非表示 */
.sp-single{display:block;}
/* PC：2本並列 / スマホ：非表示 */
.sp-dual{display:none;gap:16px;}
.sp-dual-item{flex:1;}
@media(min-width:768px){
  .sp-single{display:none;}
  .sp-dual{display:flex;}
  .sticky-progress{padding:8px 24px 10px;}
}
.sp-label{
  display:flex;justify-content:space-between;
  font-size:.68rem;font-weight:700;margin-bottom:4px;
}
.sp-label .sp-text{color:var(--purple);}
.sp-label .sp-count{color:var(--pink);}
.sp-bar-bg{height:9px;border-radius:99px;background:#f0e0f8;overflow:hidden;}
.sp-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 6px rgba(255,126,179,.2);
}
.sp-bar-fill.full{background:linear-gradient(90deg,var(--mint),#38d39f);box-shadow:0 1px 6px rgba(126,232,200,.3);}

/* ── スワイプ領域 ── */
.pane-viewport{
  flex:1;overflow:hidden;position:relative;
  touch-action:pan-y;
}
.pane-track{
  display:flex;height:100%;will-change:transform;
}
.pane{
  flex-shrink:0;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 0 60px;
  display:flex;flex-direction:column;align-items:center;
}

/* PC/iPad */
@media(min-width:768px){
  .tab-bar{display:none;}
  /* sticky-progressはPC/iPadでも表示する（display:noneを削除） */
  .pane-viewport{overflow:visible;}
  .pane-track{
    display:grid!important;
    grid-template-columns:1fr 1fr;
    gap:20px;padding:20px 24px 40px;
    width:100%!important;transform:none!important;height:auto!important;
  }
  .pane{width:100%!important;overflow-y:visible;padding:0;}
  /* PC では sticky-progress を2カラムのグリッド上部に表示するため padding調整 */
  .sticky-header{padding:0;}
  /* カード内進捗はPC不要 */
  .card-progress{display:none!important;}
}

/* ═══ カード ═══ */
.card{
  background:#fff;border-radius:28px;
  padding:18px 16px;
  width:min(440px,92vw);
  box-shadow:0 5px 26px rgba(255,126,179,.13);
  border:3px solid var(--pink2);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
@media(min-width:768px){.card{width:100%;}}

.card-title{font-size:1.02rem;font-weight:900;color:var(--purple);letter-spacing:.1em;}
.card-title span{color:var(--pink);}

/* PC用カード内進捗（スマホでは sticky-progress を使うので非表示） */
.card-progress{display:none;width:100%;flex-direction:column;gap:4px;}
.cp-label{display:flex;justify-content:space-between;font-size:.7rem;font-weight:700;}
.cp-text{color:var(--purple);}.cp-count{color:var(--pink);}
.cp-bar-bg{height:9px;border-radius:99px;background:#f0e0f8;overflow:hidden;}
.cp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .5s cubic-bezier(.4,0,.2,1);}
.cp-bar-fill.full{background:linear-gradient(90deg,var(--mint),#38d39f);}

/* ═══ ドラム ═══ */
.drum-wrap{width:100%;display:flex;flex-direction:column;align-items:center;}
.pointer{width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:20px solid var(--purple);filter:drop-shadow(0 2px 4px rgba(201,126,247,.45));margin-bottom:-3px;z-index:3;position:relative;}
.drum-window{width:100%;height:92px;border-radius:18px;border:3.5px solid var(--pink);background:linear-gradient(135deg,#fff5fb,#fce4f6);overflow:hidden;position:relative;box-shadow:0 3px 16px rgba(255,126,179,.13),inset 0 2px 5px rgba(255,255,255,.8);}
.drum-window::before,.drum-window::after{content:'';position:absolute;left:0;right:0;height:22px;z-index:2;pointer-events:none;}
.drum-window::before{top:0;background:linear-gradient(to bottom,rgba(255,245,251,.95),transparent);}
.drum-window::after{bottom:0;background:linear-gradient(to top,rgba(252,228,246,.95),transparent);}
.highlight-bar{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:48px;background:linear-gradient(90deg,rgba(255,224,102,.3),rgba(255,126,179,.13),rgba(255,224,102,.3));border-top:2px dashed var(--yellow);border-bottom:2px dashed var(--yellow);z-index:1;pointer-events:none;}
.drum-strip{display:flex;flex-direction:column;align-items:center;position:absolute;left:0;right:0;top:0;will-change:transform;}
.drum-item{height:92px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;padding:0 13px;}
.drum-icon{font-size:1.75rem;line-height:1;flex-shrink:0;}
.drum-label{font-size:clamp(.88rem,3.5vw,1.5rem);font-weight:900;color:#e060a0;letter-spacing:.07em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── ボタン行 ── */
.btn-row{width:100%;display:flex;gap:8px;align-items:stretch;}
#roll-btn{flex:1;padding:11px 9px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:900;letter-spacing:.12em;cursor:pointer;box-shadow:0 4px 14px rgba(255,126,179,.35);transition:transform .15s,box-shadow .15s;}
#roll-btn:hover:not(:disabled){transform:translateY(-2px);}
#roll-btn:active:not(:disabled){transform:scale(.97);}
#roll-btn:disabled{opacity:.6;cursor:not-allowed;}
#m-check-btn{flex:0 0 auto;padding:11px 14px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--mint),#5ec8f0);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.84rem;font-weight:900;letter-spacing:.06em;cursor:pointer;box-shadow:0 3px 12px rgba(94,200,240,.3);transition:transform .15s,max-width .28s,opacity .28s,padding .28s;white-space:nowrap;max-width:0;overflow:hidden;padding-left:0;padding-right:0;opacity:0;pointer-events:none;}
#m-check-btn.visible{max-width:150px;padding-left:14px;padding-right:14px;opacity:1;pointer-events:auto;}
#m-check-btn:hover{transform:translateY(-2px);}
#m-check-btn.done{background:linear-gradient(135deg,#b2e8d8,#a0d8ee);box-shadow:none;cursor:default;opacity:.7;}

/* ── ミッションチップ ── */
.mission-list-title{font-size:.66rem;font-weight:700;color:#c097d0;letter-spacing:.08em;margin-bottom:5px;text-align:center;}
.mission-chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;width:100%;}
.m-chip{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:11px;font-size:.72rem;font-weight:700;letter-spacing:.02em;border:2px solid var(--pink2);color:#d070a8;background:#fff5fb;transition:all .18s;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.m-chip:hover{border-color:var(--pink);background:#ffe8f5;transform:scale(1.04);}
.m-chip:active{transform:scale(.96);}
.m-chip.checked{background:linear-gradient(135deg,#e8faf4,#d4f4ea);border-color:var(--mint);color:#2a9e7a;text-decoration:line-through;opacity:.72;}
.m-chip-icon{font-size:.85rem;flex-shrink:0;}

/* 全完了バナー */
.all-done-banner{display:none;width:100%;border-radius:12px;padding:9px;background:linear-gradient(135deg,#fff8e1,#fff3e0);border:2.5px solid var(--yellow);text-align:center;font-size:.82rem;font-weight:900;color:#e0900a;}
.all-done-banner.visible{display:block;}

.bottom-row{display:flex;align-items:center;justify-content:space-between;width:100%;}
.count-row{font-size:.64rem;color:#c097d0;letter-spacing:.04em;}
.count-row b{color:var(--pink);}
.reset-btn{font-size:.62rem;color:#c097d0;background:none;border:1px solid #e8d0f0;border-radius:8px;padding:3px 8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
.reset-btn:hover{background:#fff0fb;color:var(--purple);border-color:var(--purple);}

/* ═══ 習慣 ═══ */

/* ─── アコーディオンセクション ─── */
.habit-section{width:100%;margin-bottom:5px;}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:13px;
  font-size:.78rem;font-weight:900;letter-spacing:.06em;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
.section-header:active{opacity:.75;}
.section-header.morning{background:linear-gradient(135deg,#fff3cd,#ffe8a0);color:#b8860b;}
.section-header.school {background:linear-gradient(135deg,#d4eeff,#b3daff);color:var(--navy);}
.section-header.after  {background:linear-gradient(135deg,#ffe0f0,#ffc8e8);color:#c04080;}

.section-header-left{display:flex;align-items:center;gap:7px;}
.section-icon{font-size:.95rem;}

.section-header-right{display:flex;align-items:center;gap:7px;}

/* 一括ボタン */
.bulk-btn{
  font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:9px;
  border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.bulk-btn.check-all{background:rgba(255,255,255,.7);color:inherit;}
.bulk-btn.check-all:hover{background:rgba(255,255,255,.9);}
.bulk-btn.uncheck-all{background:rgba(0,0,0,.08);color:inherit;}
.bulk-btn.uncheck-all:hover{background:rgba(0,0,0,.14);}

/* 開閉矢印 */
.chevron{
  font-size:.75rem;transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:inline-block;opacity:.7;
}
.section-header.open .chevron{transform:rotate(180deg);}

/* アコーディオン本体 */
.accordion-body{
  overflow:hidden;
  max-height:0;
  transition:max-height .35s cubic-bezier(.4,0,.2,1), opacity .28s ease;
  opacity:0;
}
.accordion-body.open{
  max-height:2000px;/* 十分大きい値 */
  opacity:1;
}

/* サブセクション */
.sub-section{margin:6px 0 2px;}
.sub-section-title{
  font-size:.68rem;font-weight:900;color:#999;
  letter-spacing:.08em;padding:0 2px 4px;
  border-bottom:1px dashed #e8d0f0;
  margin-bottom:5px;
}

.habit-list{display:flex;flex-direction:column;gap:4px;width:100%;padding-top:6px;}
.habit-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 11px;border-radius:11px;
  background:#fff;border:2px solid #f0e0f8;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .16s,border-color .16s,transform .1s;
}
.habit-item:hover{border-color:var(--pink2);background:#fff5fb;transform:translateX(2px);}
.habit-item:active{transform:scale(.98);}
.habit-item.checked{background:linear-gradient(135deg,#f0faf6,#e4f8f0);border-color:var(--mint);}
.habit-check-box{width:22px;height:22px;flex-shrink:0;border-radius:6px;border:2.5px solid var(--pink2);display:flex;align-items:center;justify-content:center;transition:all .16s;background:#fff;}
.habit-item.checked .habit-check-box{background:linear-gradient(135deg,var(--mint),#38d39f);border-color:var(--mint);}
.habit-check-mark{font-size:.82rem;color:#fff;opacity:0;transform:scale(.3);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.habit-item.checked .habit-check-mark{opacity:1;transform:scale(1);}
.habit-label{flex:1;font-size:.8rem;font-weight:700;color:#555;letter-spacing:.02em;}
.habit-item.checked .habit-label{color:#2a9e7a;text-decoration:line-through;opacity:.8;}
.habit-note{font-size:.62rem;color:#ccc;white-space:nowrap;flex-shrink:0;}
.habit-item.checked .habit-note{color:var(--mint);}

.habit-bottom{display:flex;align-items:center;justify-content:flex-end;width:100%;margin-top:3px;}

/* ── 全リセットボタン ── */
.all-reset-btn{
  font-size:.62rem;color:#e07070;background:none;
  border:1px solid #ffb3b3;border-radius:8px;
  padding:3px 9px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;
  letter-spacing:.05em;
  transition:all .2s;
}
.all-reset-btn:hover{background:#fff0f0;color:#e05050;border-color:#e05050;}
.all-reset-btn:active{transform:scale(.96);}

/* ═══ confetti ═══ */
.confetti-piece{position:fixed;border-radius:2px;pointer-events:none;z-index:200;animation:confettiFall 1.6s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="app">

  <!-- ── 固定ヘッダー（タブ＋進捗） ── -->
  <div class="sticky-header">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-mission" onclick="switchTab(0)">
        <span class="tab-icon">🎲</span>ミッション
      </button>
      <button class="tab-btn" id="tab-habit" onclick="switchTab(1)">
        <span class="tab-icon">✅</span>習慣チェック
      </button>
    </div>
    <!-- スマホ：現在タブの進捗 / PC：両方の進捗を並べて表示 -->
    <div class="sticky-progress" id="sticky-progress">
      <!-- スマホ用（1本） -->
      <div class="sp-single" id="sp-single">
        <div class="sp-label">
          <span class="sp-text" id="sp-text">📋 ミッション進捗</span>
          <span class="sp-count" id="sp-count">0 / 11 完了</span>
        </div>
        <div class="sp-bar-bg"><div class="sp-bar-fill" id="sp-bar" style="width:0%"></div></div>
      </div>
      <!-- PC用（2本並列） -->
      <div class="sp-dual" id="sp-dual">
        <div class="sp-dual-item">
          <div class="sp-label">
            <span class="sp-text">📋 ミッション</span>
            <span class="sp-count" id="sp-m-count">0 / 11 完了</span>
          </div>
          <div class="sp-bar-bg"><div class="sp-bar-fill" id="sp-m-bar" style="width:0%"></div></div>
        </div>
        <div class="sp-dual-item">
          <div class="sp-label">
            <span class="sp-text">✅ 習慣チェック</span>
            <span class="sp-count" id="sp-h-count">0 / 0 完了</span>
          </div>
          <div class="sp-bar-bg"><div class="sp-bar-fill" id="sp-h-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── スワイプ領域 ── -->
  <div class="pane-viewport" id="pane-viewport">
    <div class="pane-track" id="pane-track">

      <!-- ミッションペイン -->
      <div class="pane" id="pane-mission">
        <div class="card">
          <div class="card-title">✨ きょうの <span>ミッション</span> ✨</div>
          <!-- PC用進捗 -->
          <div class="card-progress" id="m-card-progress">
            <div class="cp-label"><span class="cp-text">📋 ミッション進捗</span><span class="cp-count" id="m-cp-count">0 / 11 完了</span></div>
            <div class="cp-bar-bg"><div class="cp-bar-fill" id="m-cp-bar" style="width:0%"></div></div>
          </div>
          <div class="drum-wrap">
            <div class="pointer"></div>
            <div class="drum-window">
              <div class="highlight-bar"></div>
              <div class="drum-strip" id="strip"></div>
            </div>
          </div>
          <div class="btn-row">
            <button id="roll-btn" onclick="startRoll()">🎲 まわす！</button>
            <button id="m-check-btn" onclick="checkMission()">✅ おわった！</button>
          </div>
          <div class="all-done-banner" id="m-all-done">🎊 ミッション ぜんぶ クリア！すごい！🎊</div>
          <div style="width:100%">
            <div class="mission-list-title">📋 タップしてもチェックできるよ！</div>
            <div class="mission-chips" id="mission-chips"></div>
          </div>
          <div class="bottom-row">
            <div class="count-row">まわした回数 <b id="m-roll-count">0</b> かい</div>
            <button class="reset-btn" onclick="resetMission()">🔄 リセット</button>
          </div>
        </div>
      </div>

      <!-- 習慣ペイン -->
      <div class="pane" id="pane-habit">
        <div class="card">
          <div class="card-title">🌟 きょうの <span>習慣チェック</span></div>
          <!-- PC用進捗 -->
          <div class="card-progress" id="h-card-progress">
            <div class="cp-label"><span class="cp-text">✅ 習慣進捗</span><span class="cp-count" id="h-cp-count">0 / 0 完了</span></div>
            <div class="cp-bar-bg"><div class="cp-bar-fill" id="h-cp-bar" style="width:0%"></div></div>
          </div>
          <div class="all-done-banner" id="h-all-done">🌈 けさのルーティン ぜんぶ できたよ！えらい！🌈</div>

          <!-- 朝 -->
          <div class="habit-section" id="sec-morning">
            <div class="section-header morning open" onclick="toggleSection('morning')">
              <div class="section-header-left"><span class="section-icon">🌅</span>朝のルーティン<span id="sec-cnt-morning" style="font-size:.7rem;margin-left:4px;opacity:.8"></span></div>
              <div class="section-header-right">
                <button class="bulk-btn check-all" id="bulk-morning" onclick.stop="bulkCheck('morning',event)">まとめてチェック</button>
                <span class="chevron">▼</span>
              </div>
            </div>
            <div class="accordion-body open" id="body-morning">
              <div class="habit-list" id="habit-list-morning"></div>
            </div>
          </div>

          <!-- 学校準備 -->
          <div class="habit-section" id="sec-school">
            <div class="section-header school open" onclick="toggleSection('school')">
              <div class="section-header-left"><span class="section-icon">🎒</span>学校じゅんび<span id="sec-cnt-school" style="font-size:.7rem;margin-left:4px;opacity:.8"></span></div>
              <div class="section-header-right">
                <button class="bulk-btn check-all" id="bulk-school" onclick.stop="bulkCheck('school',event)">まとめてチェック</button>
                <span class="chevron">▼</span>
              </div>
            </div>
            <div class="accordion-body open" id="body-school">
              <div class="habit-list" id="habit-list-school"></div>
            </div>
          </div>

          <!-- 下校後 -->
          <div class="habit-section" id="sec-after">
            <div class="section-header after open" onclick="toggleSection('after')">
              <div class="section-header-left"><span class="section-icon">🌇</span>下校後にやること<span id="sec-cnt-after" style="font-size:.7rem;margin-left:4px;opacity:.8"></span></div>
              <div class="section-header-right">
                <button class="bulk-btn check-all" id="bulk-after" onclick.stop="bulkCheck('after',event)">まとめてチェック</button>
                <span class="chevron">▼</span>
              </div>

let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(type,freq,vol,start,dur){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+.02);g.gain.exponentialRampToValueAtTime(.001,start+dur);o.start(start);o.stop(start+dur+.01);}
function playStart(){const c=getCtx();[440,550,660].forEach((f,i)=>tone('triangle',f,.18,c.currentTime+i*.07,.14));}
function playRollTick(s){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=500+s*800;g.gain.setValueAtTime(.055,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.04);o.start(c.currentTime);o.stop(c.currentTime+.04);}
function playLand(){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(60,c.currentTime+.3);g.gain.setValueAtTime(.45,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);o.start(c.currentTime);o.stop(c.currentTime+.4);}
function playFanfare(){const c=getCtx();[{f:523,t:0},{f:659,t:.12},{f:784,t:.24},{f:1047,t:.36}].forEach(({f,t})=>tone('triangle',f,.2,c.currentTime+t,.2));}
function playHabitCheck(){const c=getCtx();tone('sine',660,.15,c.currentTime,.1);tone('sine',880,.11,c.currentTime+.06,.1);}

function playMCheck(){const c=getCtx();[880,1100,1320].forEach((f,i)=>tone('sine',f,.18,c.currentTime+i*.08,.2));}
function playAllClear(){const c=getCtx();[{f:523,t:0},{f:659,t:.13},{f:784,t:.26},{f:1047,t:.4},{f:784,t:.54},{f:1047,t:.68}].forEach(({f,t})=>tone('triangle',f,.24,c.currentTime+t,.22));[{f:330,t:.4},{f:440,t:.54},{f:523,t:.68}].forEach(({f,t})=>tone('sine',f,.09,c.currentTime+t,.3));}

function playBulk(n){const c=getCtx();for(let i=0;i<Math.min(n,6);i++)tone('sine',660+i*80,.12,c.currentTime+i*.07,.11);}

// ══════════════════════════════
// タブ切替 & スワイプ
// ══════════════════════════════
let currentTab=0;
const track=document.getElementById('pane-track');
const viewport=document.getElementById('pane-viewport');

function initTrack(){
  if(window.innerWidth>=768)return;
  const w=viewport.clientWidth;
  track.style.width=(w*2)+'px';
  document.getElementById('pane-mission').style.width=w+'px';
  document.getElementById('pane-habit').style.width=w+'px';
  setTrackX(currentTab*w,false);
}
function setTrackX(x,animate){
  track.style.transition=animate?'transform .35s cubic-bezier(.25,.46,.45,.94)':'none';
  track.style.transform=`translateX(${-x}px)`;
}
function switchTab(idx,animate=true){
  if(window.innerWidth>=768)return;
  currentTab=idx;
  setTrackX(idx*viewport.clientWidth,animate);
  document.getElementById('tab-mission').classList.toggle('active',idx===0);
  document.getElementById('tab-habit').classList.toggle('active',idx===1);
  updateStickyProgress();
}

let touchStartX=0,touchStartY=0,touchCurX=0,touchLastX=0,touchLastT=0;
let touchVelX=0,isDragging=false,isDecided=false,isHorizontal=false,trackStartOff=0;

viewport.addEventListener('touchstart',e=>{
  if(window.innerWidth>=768)return;
  const t=e.touches[0];
  touchStartX=touchCurX=touchLastX=t.clientX;touchStartY=t.clientY;
  touchLastT=Date.now();touchVelX=0;
  isDragging=true;isDecided=false;isHorizontal=false;
  trackStartOff=currentTab*viewport.clientWidth;
  track.style.transition='none';
},{passive:true});

viewport.addEventListener('touchmove',e=>{
  if(!isDragging||window.innerWidth>=768)return;
  const t=e.touches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  if(!isDecided){
    if(Math.abs(dx)<4&&Math.abs(dy)<4)return;
    isDecided=true;isHorizontal=Math.abs(dx)>Math.abs(dy);
  }
  if(!isHorizontal)return;
  e.preventDefault();
  const now=Date.now(),dt=now-touchLastT;
  if(dt>0)touchVelX=(t.clientX-touchLastX)/dt*1000;
  touchLastX=t.clientX;touchLastT=now;touchCurX=t.clientX;
  let off=trackStartOff-(t.clientX-touchStartX);
  const max=(2-1)*viewport.clientWidth;
  if(off<0)off*=0.22;else if(off>max)off=max+(off-max)*0.22;
  track.style.transform=`translateX(${-off}px)`;
},{passive:false});

viewport.addEventListener('touchend',e=>{
  if(!isDragging||!isHorizontal||window.innerWidth>=768){isDragging=false;return;}
  isDragging=false;
  const dx=touchCurX-touchStartX,w=viewport.clientWidth;
  let next=currentTab;
  if(touchVelX<-280||dx<-w*0.33)next=Math.min(currentTab+1,1);
  else if(touchVelX>280||dx>w*0.33)next=Math.max(currentTab-1,0);
  switchTab(next,true);
},{passive:true});

window.addEventListener('resize',()=>{
  if(window.innerWidth>=768){
    track.style.width='';track.style.transform='';track.style.transition='';
    document.getElementById('pane-mission').style.width='';
    document.getElementById('pane-habit').style.width='';
  } else initTrack();
});
initTrack();

// ══════════════════════════════
// ミッション：ドラム
// ══════════════════════════════
const REPEATS=6,ITEM_H=92,LOOP_LEN=MISSION_ITEMS.length;
const strip=document.getElementById('strip');
for(let r=0;r<REPEATS;r++) MISSION_ITEMS.forEach(it=>{
  const d=document.createElement('div');d.className='drum-item';
  d.innerHTML=`<span class="drum-icon">${it.icon}</span><span class="drum-label">${it.label}</span>`;
  strip.appendChild(d);
});
let stripIdx=0;
function itemY(i){return -(i*ITEM_H);}
strip.style.transform=`translateY(${itemY(LOOP_LEN*2+stripIdx)}px)`;

const rollBtn=document.getElementById('roll-btn');
const mCheckBtn=document.getElementById('m-check-btn');
document.getElementById('m-roll-count').textContent=mRolls;

function renderMChips(){
  const chips=document.getElementById('mission-chips');chips.innerHTML='';
  MISSION_ITEMS.forEach(it=>{
    const c=document.createElement('div');const done=mChecked.includes(it.label);
    c.className='m-chip'+(done?' checked':'');
    c.innerHTML=`<span class="m-chip-icon">${it.icon}</span>${it.label}`;
    c.addEventListener('click',()=>toggleMChip(it.label));chips.appendChild(c);
  });
  const allDone=mChecked.length>=MISSION_ITEMS.length;
  document.getElementById('m-all-done').classList.toggle('visible',allDone);
  rollBtn.disabled=allDone;
  if(allDone)rollBtn.textContent='🎊 ぜんぶクリア！';
  else if(!mRolling)rollBtn.textContent=mRolls>0?'🎲 もういちど！':'🎲 まわす！';
  updateStickyProgress();
}
renderMChips();

function toggleMChip(label){
  if(mRolling)return;
  const i=mChecked.indexOf(label);
  if(i===-1){mChecked.push(label);playMCheck();launchConfetti(14);
    if(label===mCurrentLabel){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
  } else {
    mChecked.splice(i,1);
    if(label===mCurrentLabel){mCheckBtn.classList.remove('done');mCheckBtn.textContent='✅ おわった！';mCheckBtn.disabled=false;}
  }
  saveJSON(`m_checked_${TODAY}`,mChecked);renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(75);},200);
}

function startRoll(){
  if(mRolling)return;const pool=mRemaining();if(!pool.length)return;
  mRolling=true;rollBtn.disabled=true;rollBtn.textContent='🌀 まわってるよ…';
  mCheckBtn.classList.remove('visible','done');mCheckBtn.disabled=false;mCheckBtn.textContent='✅ おわった！';
  playStart();
  const chosen=pool[Math.floor(Math.random()*pool.length)];
  const nextIdx=MISSION_ITEMS.indexOf(chosen);
  const finalIdx=LOOP_LEN*3+nextIdx+LOOP_LEN*2;
  const sy=itemY(LOOP_LEN*2+stripIdx),dist=itemY(finalIdx)-sy;
  const DUR=3200,st=performance.now();let lastY=sy,landOk=true;
  function eob(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
  function ease(t){return t<.35?(t/.35)*(t/.35)*.35:eob(t);}
  function tick(now){
    const t=Math.min((now-st)/DUR,1),y=sy+dist*ease(t);
    strip.style.transform=`translateY(${y}px)`;
    if(Math.abs(y-lastY)>=ITEM_H){playRollTick(Math.min(t*1.5,1));lastY=y;}
    if(t>.88&&landOk){playLand();landOk=false;}
    if(t<1){requestAnimationFrame(tick);return;}
    stripIdx=nextIdx;strip.style.transition='none';
    strip.style.transform=`translateY(${itemY(LOOP_LEN*2+nextIdx)}px)`;
    mCurrentLabel=chosen.label;playFanfare();launchConfetti();
    const alreadyDone=mChecked.includes(mCurrentLabel);
    mCheckBtn.classList.add('visible');
    if(alreadyDone){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
    mRolls++;document.getElementById('m-roll-count').textContent=mRolls;localStorage.setItem(`m_rolls_${TODAY}`,mRolls);
    rollBtn.textContent='🎲 もういちど！';rollBtn.disabled=false;mRolling=false;
  }
  requestAnimationFrame(tick);
}
function checkMission(){
  if(!mCurrentLabel||mChecked.includes(mCurrentLabel))return;
  mChecked.push(mCurrentLabel);saveJSON(`m_checked_${TODAY}`,mChecked);
  playMCheck();launchConfetti(18);
  mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;
  renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(75);},200);
}
function resetMission(){
  if(!confirm('ミッションのチェックをリセットするよ？'))return;
  mChecked=[];saveJSON(`m_checked_${TODAY}`,[]);mCurrentLabel=null;
  mCheckBtn.classList.remove('visible','done');rollBtn.disabled=false;rollBtn.textContent='🎲 まわす！';
  renderMChips();
}

function secCheckedCount(secId){
  const sec=HABIT_SECTIONS.find(s=>s.id===secId);
  let ids=[];
  if(sec.items)ids=sec.items.map(it=>it.id);
  if(sec.subSections)sec.subSections.forEach(ss=>ss.items.forEach(it=>ids.push(it.id)));
  return ids.filter(id=>hChecked.includes(id)).length+'/'+ids.length;
}

function renderHabits(){
  // 朝 / 学校
  ['morning','school'].forEach(secId=>{
    const sec=HABIT_SECTIONS.find(s=>s.id===secId);
    const list=document.getElementById(`habit-list-${secId}`);list.innerHTML='';
    const allDone=sec.items.every(it=>hChecked.includes(it.id));
    const bulk=document.getElementById(`bulk-${secId}`);
    bulk.textContent=allDone?'チェックを外す':'まとめてチェック';
    bulk.className='bulk-btn '+(allDone?'uncheck-all':'check-all');
    bulk.onclick=(e)=>{e.stopPropagation();allDone?bulkUncheck(secId):bulkCheck(secId);};
    sec.items.forEach(item=>list.appendChild(makeHabitItem(item)));
    const cnt=document.getElementById(`sec-cnt-${secId}`);
    if(cnt)cnt.textContent='('+secCheckedCount(secId)+')';
  });

  // 下校後（サブセクション）
  const afterSec=HABIT_SECTIONS.find(s=>s.id==='after');
  const wrap=document.getElementById('habit-list-after-wrap');wrap.innerHTML='';
  const allAfterIds=getAfterItems().map(it=>it.id);
  const allAfterDone=allAfterIds.every(id=>hChecked.includes(id));
  const bulkAfter=document.getElementById('bulk-after');
  bulkAfter.textContent=allAfterDone?'チェックを外す':'まとめてチェック';
  bulkAfter.className='bulk-btn '+(allAfterDone?'uncheck-all':'check-all');
  bulkAfter.onclick=(e)=>{e.stopPropagation();allAfterDone?bulkUncheck('after'):bulkCheck('after');};
  afterSec.subSections.forEach(ss=>{
    const subDiv=document.createElement('div');subDiv.className='sub-section';
    const title=document.createElement('div');title.className='sub-section-title';title.textContent=ss.label;
    subDiv.appendChild(title);
    const list=document.createElement('div');list.className='habit-list';
    ss.items.forEach(item=>list.appendChild(makeHabitItem(item)));
    subDiv.appendChild(list);wrap.appendChild(subDiv);
  });
  const cnt=document.getElementById('sec-cnt-after');
  if(cnt)cnt.textContent='('+secCheckedCount('after')+')';

  // 全完了
  const allDone=hChecked.length>=TOTAL_HABITS;
  document.getElementById('h-all-done').classList.toggle('visible',allDone);
  updateStickyProgress();
}

function makeHabitItem(item){
  const done=hChecked.includes(item.id);
  const el=document.createElement('div');
  el.className='habit-item'+(done?' checked':'');
  el.innerHTML=`
    <div class="habit-check-box"><span class="habit-check-mark">✓</span></div>
    <span style="font-size:.95rem;flex-shrink:0">${item.icon}</span>
    <span class="habit-label">${item.label}</span>
    ${item.note?`<span class="habit-note">${item.note}</span>`:''}
  `;
  el.addEventListener('click',()=>toggleHabit(item.id));
  return el;
}

renderHabits();
initAccordions();

function toggleHabit(id){
  const wasAll=hChecked.length>=TOTAL_HABITS;
  const i=hChecked.indexOf(id);
  if(i===-1){hChecked.push(id);playHabitCheck();launchConfetti(7,'#7ee8c8');}
  else{hChecked.splice(i,1);playHabitUncheck();}
  saveJSON(`h_checked_${TODAY}`,hChecked);renderHabits();
  if(!wasAll&&hChecked.length>=TOTAL_HABITS)setTimeout(()=>{playHabitAllClear();launchConfetti(60);},200);
}

function bulkCheck(secId){
  const sec=HABIT_SECTIONS.find(s=>s.id===secId);
  const wasAll=hChecked.length>=TOTAL_HABITS;
  let allIds=[];
  if(sec.items)allIds=sec.items.map(it=>it.id);
  if(sec.subSections)sec.subSections.forEach(ss=>ss.items.forEach(it=>allIds.push(it.id)));
  const newIds=allIds.filter(id=>!hChecked.includes(id));
  newIds.forEach(id=>hChecked.push(id));
  saveJSON(`h_checked_${TODAY}`,hChecked);
  if(newIds.length){playBulk(newIds.length);launchConfetti(18,'#7ee8c8');}
  renderHabits();
  if(!wasAll&&hChecked.length>=TOTAL_HABITS)setTimeout(()=>{playHabitAllClear();launchConfetti(60);},200);
}
function bulkUncheck(secId){
  const sec=HABIT_SECTIONS.find(s=>s.id===secId);
  let allIds=[];
  if(sec.items)allIds=sec.items.map(it=>it.id);
  if(sec.subSections)sec.subSections.forEach(ss=>ss.items.forEach(it=>allIds.push(it.id)));
  hChecked=hChecked.filter(id=>!allIds.includes(id));
  saveJSON(`h_checked_${TODAY}`,hChecked);renderHabits();
}
function resetHabit(){
  if(!confirm('習慣チェックをリセットするよ？'))return;
  hChecked=[];saveJSON(`h_checked_${TODAY}`,[]);renderHabits();
}
function resetAll(){
  if(!confirm('ミッションも習慣も、ぜんぶリセットするよ？\nよくかんがえてね！'))return;
  // ミッションリセット
  mChecked=[];saveJSON(`m_checked_${TODAY}`,[]);mCurrentLabel=null;
  mCheckBtn.classList.remove('visible','done');rollBtn.disabled=false;rollBtn.textContent='🎲 まわす！';
  renderMChips();
  // 習慣リセット
  hChecked=[];saveJSON(`h_checked_${TODAY}`,[]);renderHabits();
}

// ══════════════════════════════
// confetti
// ══════════════════════════════
const COLORS=['#ff7eb3','#ffb3d1','#c97ef7','#ffe066','#7ee8c8','#ff9de2','#74b9ff'];
function launchConfetti(n=50,extra){
  const colors=extra?[extra,...COLORS]:COLORS;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*20}vh;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.2+Math.random()*.9}s;animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

// 浮かぶ星
['⭐','✨','💫','🌸','💕','🎀'].forEach(e=>{
  for(let j=0;j<3;j++){
    const s=document.createElement('div');s.className='star';s.textContent=e;
    s.style.cssText=`left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*12}s;font-size:${.88+Math.random()*.85}rem;`;
    document.getElementById('stars').appendChild(s);
  }
});

updateStickyProgress();
document.addEventListener('keydown',e=>{if(e.code==='Space'&&currentTab===0){e.preventDefault();startRoll();}});
</script>
