<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>✨ きょうのミッション ✨</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ミッション"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#ff7eb3"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#ff7eb3;--pink2:#ffb3d1;--purple:#c97ef7;
  --yellow:#ffe066;--mint:#7ee8c8;--bg:#fff0f8;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);min-height:100vh;
  overflow-x:hidden;position:relative;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;animation:floatStar linear infinite;opacity:.5;}
@keyframes floatStar{
  0%  {transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%,90%{opacity:.5;}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

/* ═══ アプリシェル ═══ */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── タブバー ── */
.tab-bar{
  display:flex;position:sticky;top:0;z-index:50;
  background:#fff;border-bottom:3px solid var(--pink2);
  box-shadow:0 2px 12px rgba(255,126,179,.15);
  flex-shrink:0;
}
.tab-btn{
  flex:1;padding:13px 8px 11px;border:none;background:transparent;
  font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:700;
  letter-spacing:.05em;color:#c097d0;cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-3px;
  transition:color .2s,border-color .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab-btn .tab-icon{font-size:1.2rem;}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink);}

/* ── スワイプ領域 ── */
.pane-viewport{
  flex:1;overflow:hidden;position:relative;
  /* ネイティブスクロールと競合しないように */
  touch-action:pan-y;
}
.pane-track{
  display:flex;
  /* JS で width と transform を管理 */
  height:100%;
  will-change:transform;
  /* transition は JS で動的に付け外し */
}
.pane{
  flex-shrink:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:18px 0 60px;
  display:flex;flex-direction:column;align-items:center;
}

/* ═══ PC / iPad ═══ */
@media(min-width:768px){
  .tab-bar{display:none;}
  .pane-viewport{overflow:visible;}
  .pane-track{
    display:grid!important;
    grid-template-columns:1fr 1fr;
    gap:20px;padding:24px 24px 40px;
    width:100%!important;
    transform:none!important;
    height:auto!important;
  }
  .pane{width:100%!important;overflow-y:visible;padding:0;}
}

/* ═══ カード ═══ */
.card{
  background:#fff;border-radius:32px;
  padding:20px 18px;
  width:min(440px,92vw);
  box-shadow:0 6px 30px rgba(255,126,179,.14);
  border:3px solid var(--pink2);
  display:flex;flex-direction:column;align-items:center;gap:13px;
}
@media(min-width:768px){.card{width:100%;}}

.card-title{font-size:1.05rem;font-weight:900;color:var(--purple);letter-spacing:.1em;}
.card-title span{color:var(--pink);}

/* ─── 進捗 ─── */
.progress-wrap{width:100%;}
.progress-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.76rem;font-weight:700;margin-bottom:5px;
}
.prog-text{color:var(--purple);}
.prog-count{color:var(--pink);font-size:.88rem;}
.progress-bar-bg{width:100%;height:11px;border-radius:99px;background:#f0e0f8;overflow:hidden;}
.progress-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 8px rgba(255,126,179,.25);
}
.progress-bar-fill.full{background:linear-gradient(90deg,var(--mint),#38d39f);box-shadow:0 2px 8px rgba(126,232,200,.35);}

/* ═══ ドラム ═══ */
.drum-wrap{width:100%;display:flex;flex-direction:column;align-items:center;}
.pointer{
  width:0;height:0;
  border-left:13px solid transparent;border-right:13px solid transparent;
  border-top:21px solid var(--purple);
  filter:drop-shadow(0 2px 4px rgba(201,126,247,.5));
  margin-bottom:-3px;z-index:3;position:relative;
}
.drum-window{
  width:100%;height:96px;border-radius:20px;
  border:4px solid var(--pink);
  background:linear-gradient(135deg,#fff5fb,#fce4f6);
  overflow:hidden;position:relative;
  box-shadow:0 4px 18px rgba(255,126,179,.14),inset 0 2px 6px rgba(255,255,255,.8);
}
.drum-window::before,.drum-window::after{
  content:'';position:absolute;left:0;right:0;height:24px;z-index:2;pointer-events:none;
}
.drum-window::before{top:0;background:linear-gradient(to bottom,rgba(255,245,251,.95),transparent);}
.drum-window::after{bottom:0;background:linear-gradient(to top,rgba(252,228,246,.95),transparent);}
.highlight-bar{
  position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:50px;
  background:linear-gradient(90deg,rgba(255,224,102,.3),rgba(255,126,179,.14),rgba(255,224,102,.3));
  border-top:2px dashed var(--yellow);border-bottom:2px dashed var(--yellow);
  z-index:1;pointer-events:none;
}
.drum-strip{display:flex;flex-direction:column;align-items:center;position:absolute;left:0;right:0;top:0;will-change:transform;}
.drum-item{height:96px;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;padding:0 14px;}
.drum-icon{font-size:1.85rem;line-height:1;flex-shrink:0;}
.drum-label{font-size:clamp(.9rem,3.6vw,1.55rem);font-weight:900;color:#e060a0;letter-spacing:.07em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── ボタン行 ── */
.btn-row{width:100%;display:flex;gap:9px;align-items:stretch;}
#roll-btn{
  flex:1;padding:12px 10px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;font-family:'Noto Sans JP',sans-serif;
  font-size:.95rem;font-weight:900;letter-spacing:.13em;
  cursor:pointer;box-shadow:0 5px 16px rgba(255,126,179,.38);
  transition:transform .15s,box-shadow .15s;
}
#roll-btn:hover:not(:disabled){transform:translateY(-2px);}
#roll-btn:active:not(:disabled){transform:scale(.97);}
#roll-btn:disabled{opacity:.6;cursor:not-allowed;}
#m-check-btn{
  flex:0 0 auto;padding:12px 15px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--mint),#5ec8f0);
  color:#fff;font-family:'Noto Sans JP',sans-serif;
  font-size:.88rem;font-weight:900;letter-spacing:.07em;
  cursor:pointer;box-shadow:0 4px 13px rgba(94,200,240,.32);
  transition:transform .15s,max-width .28s,opacity .28s,padding .28s;
  white-space:nowrap;max-width:0;overflow:hidden;
  padding-left:0;padding-right:0;opacity:0;pointer-events:none;
}
#m-check-btn.visible{max-width:160px;padding-left:15px;padding-right:15px;opacity:1;pointer-events:auto;}
#m-check-btn:hover{transform:translateY(-2px);}
#m-check-btn:active{transform:scale(.97);}
#m-check-btn.done{background:linear-gradient(135deg,#b2e8d8,#a0d8ee);box-shadow:none;cursor:default;opacity:.7;}

/* ── ミッションチップ ── */
.mission-list-title{font-size:.68rem;font-weight:700;color:#c097d0;letter-spacing:.1em;margin-bottom:6px;text-align:center;}
.mission-chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:6px;width:100%;}
.m-chip{
  display:flex;align-items:center;gap:4px;
  padding:6px 9px;border-radius:13px;
  font-size:.74rem;font-weight:700;letter-spacing:.02em;
  border:2px solid var(--pink2);color:#d070a8;background:#fff5fb;
  transition:all .2s;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.m-chip:hover{border-color:var(--pink);background:#ffe8f5;transform:scale(1.04);}
.m-chip:active{transform:scale(.96);}
.m-chip.checked{background:linear-gradient(135deg,#e8faf4,#d4f4ea);border-color:var(--mint);color:#2a9e7a;text-decoration:line-through;opacity:.72;}
.m-chip-icon{font-size:.88rem;flex-shrink:0;}

/* ── 全完了バナー ── */
.all-done-banner{
  display:none;width:100%;border-radius:14px;padding:10px;
  background:linear-gradient(135deg,#fff8e1,#fff3e0);
  border:2.5px solid var(--yellow);
  text-align:center;font-size:.85rem;font-weight:900;color:#e0900a;
}
.all-done-banner.visible{display:block;}

/* ── 下部行 ── */
.bottom-row{display:flex;align-items:center;justify-content:space-between;width:100%;}
.count-row{font-size:.66rem;color:#c097d0;letter-spacing:.05em;}
.count-row b{color:var(--pink);}
.reset-btn{
  font-size:.64rem;color:#c097d0;background:none;
  border:1px solid #e8d0f0;border-radius:9px;padding:3px 9px;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;
}
.reset-btn:hover{background:#fff0fb;color:var(--purple);border-color:var(--purple);}

/* ═══ 習慣タブ ═══ */
.habit-section{width:100%;margin-bottom:4px;}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-radius:13px;
  font-size:.8rem;font-weight:900;letter-spacing:.07em;margin-bottom:7px;
}
.section-header.morning{background:linear-gradient(135deg,#fff3cd,#ffe8a0);color:#b8860b;}
.section-header.school{background:linear-gradient(135deg,#d4eeff,#b3daff);color:#1a6fa8;}
.section-header-left{display:flex;align-items:center;gap:6px;}
.section-icon{font-size:1rem;}

/* 一括チェックボタン */
.bulk-btn{
  font-size:.68rem;font-weight:700;
  padding:4px 10px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.bulk-btn.check-all{
  background:linear-gradient(135deg,var(--mint),#5ec8f0);color:#fff;
  box-shadow:0 2px 8px rgba(94,200,240,.3);
}
.bulk-btn.check-all:hover{transform:scale(1.05);}
.bulk-btn.uncheck-all{
  background:#f0e0f8;color:var(--purple);
}
.bulk-btn.uncheck-all:hover{background:#e8d0f0;}

.habit-list{display:flex;flex-direction:column;gap:5px;width:100%;}
.habit-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 13px;border-radius:13px;
  background:#fff;border:2px solid #f0e0f8;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .18s,border-color .18s,transform .12s;
}
.habit-item:hover{border-color:var(--pink2);background:#fff5fb;transform:translateX(3px);}
.habit-item:active{transform:scale(.98);}
.habit-item.checked{background:linear-gradient(135deg,#f0faf6,#e4f8f0);border-color:var(--mint);}
.habit-check-box{
  width:24px;height:24px;flex-shrink:0;border-radius:7px;
  border:2.5px solid var(--pink2);
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;background:#fff;
}
.habit-item.checked .habit-check-box{background:linear-gradient(135deg,var(--mint),#38d39f);border-color:var(--mint);}
.habit-check-mark{font-size:.92rem;color:#fff;opacity:0;transform:scale(.4);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.habit-item.checked .habit-check-mark{opacity:1;transform:scale(1);}
.habit-label{flex:1;font-size:.82rem;font-weight:700;color:#555;letter-spacing:.02em;}
.habit-item.checked .habit-label{color:#2a9e7a;text-decoration:line-through;opacity:.8;}
.habit-note{font-size:.65rem;color:#bbb;white-space:nowrap;flex-shrink:0;}
.habit-item.checked .habit-note{color:var(--mint);}
.habit-bottom{display:flex;align-items:center;justify-content:flex-end;width:100%;margin-top:2px;}

/* ═══ confetti ═══ */
.confetti-piece{
  position:fixed;border-radius:2px;pointer-events:none;z-index:200;
  animation:confettiFall 1.6s ease-in forwards;
}
@keyframes confettiFall{
  0%  {transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="app">

  <!-- タブバー -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-mission" onclick="switchTab(0)">
      <span class="tab-icon">🎲</span>ミッション
    </button>
    <button class="tab-btn" id="tab-habit" onclick="switchTab(1)">
      <span class="tab-icon">✅</span>習慣チェック
    </button>
  </div>

  <!-- スワイプ領域 -->
  <div class="pane-viewport" id="pane-viewport">
    <div class="pane-track" id="pane-track">

      <!-- ミッションペイン -->
      <div class="pane" id="pane-mission">
        <div class="card">
          <div class="card-title">✨ きょうの <span>ミッション</span> ✨</div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span class="prog-text">📋 ミッション進捗</span>
              <span class="prog-count" id="m-prog-count">0 / 11 完了</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="m-prog-bar" style="width:0%"></div></div>
          </div>
          <div class="drum-wrap">
            <div class="pointer"></div>
            <div class="drum-window">
              <div class="highlight-bar"></div>
              <div class="drum-strip" id="strip"></div>
            </div>
          </div>
          <div class="btn-row">
            <button id="roll-btn" onclick="startRoll()">🎲 まわす！</button>
            <button id="m-check-btn" onclick="checkMission()">✅ おわった！</button>
          </div>
          <div class="all-done-banner" id="m-all-done">🎊 ミッション ぜんぶ クリア！すごい！🎊</div>
          <div style="width:100%">
            <div class="mission-list-title">📋 タップしてもチェックできるよ！</div>
            <div class="mission-chips" id="mission-chips"></div>
          </div>
          <div class="bottom-row">
            <div class="count-row">まわした回数 <b id="m-roll-count">0</b> かい</div>
            <button class="reset-btn" onclick="resetMission()">🔄 リセット</button>
          </div>
        </div>
      </div>

      <!-- 習慣ペイン -->
      <div class="pane" id="pane-habit">
        <div class="card">
          <div class="card-title">🌟 きょうの <span>習慣チェック</span></div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span class="prog-text">✅ 習慣進捗</span>
              <span class="prog-count" id="h-prog-count">0 / 21 完了</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="h-prog-bar" style="width:0%"></div></div>
          </div>
          <div class="all-done-banner" id="h-all-done">🌈 けさのルーティン ぜんぶ できたよ！えらい！🌈</div>

          <!-- 朝 -->
          <div class="habit-section">
            <div class="section-header morning">
              <div class="section-header-left"><span class="section-icon">🌅</span>朝のルーティン</div>
              <button class="bulk-btn check-all" id="bulk-morning" onclick="bulkCheck('morning')">まとめてチェック</button>
            </div>
            <div class="habit-list" id="habit-list-morning"></div>
          </div>

          <!-- 学校準備 -->
          <div class="habit-section">
            <div class="section-header school">
              <div class="section-header-left"><span class="section-icon">🎒</span>学校じゅんび</div>
              <button class="bulk-btn check-all" id="bulk-school" onclick="bulkCheck('school')">まとめてチェック</button>
            </div>
            <div class="habit-list" id="habit-list-school"></div>
          </div>

          <div class="habit-bottom">
            <button class="reset-btn" onclick="resetHabit()">🔄 リセット</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div><!-- /app -->

<script>
// ══════════════════════════════════════
// 効果音
// ══════════════════════════════════════
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(type,freq,vol,start,dur){
  const ctx=getCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+.02);
  g.gain.exponentialRampToValueAtTime(.001,start+dur);
  o.start(start);o.stop(start+dur+.01);
}
function playStart(){const c=getCtx();[440,550,660].forEach((f,i)=>tone('triangle',f,.2,c.currentTime+i*.07,.15));}
function playRollTick(spd){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=500+spd*800;g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.04);o.start(c.currentTime);o.stop(c.currentTime+.04);}
function playLand(){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(60,c.currentTime+.3);g.gain.setValueAtTime(.5,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.35);o.start(c.currentTime);o.stop(c.currentTime+.4);}
function playFanfare(){const c=getCtx();[{f:523,t:0},{f:659,t:.12},{f:784,t:.24},{f:1047,t:.36}].forEach(({f,t})=>tone('triangle',f,.22,c.currentTime+t,.2));}
function playHabitCheck(){const c=getCtx();tone('sine',660,.16,c.currentTime,.1);tone('sine',880,.12,c.currentTime+.06,.1);}
function playHabitUncheck(){tone('sine',440,.08,getCtx().currentTime,.1);}
function playMCheck(){const c=getCtx();[{f:880,t:0},{f:1100,t:.08},{f:1320,t:.16}].forEach(({f,t})=>tone('sine',f,.2,c.currentTime+t,.2));}
function playAllClear(){const c=getCtx();[{f:523,t:0},{f:659,t:.13},{f:784,t:.26},{f:1047,t:.4},{f:784,t:.54},{f:1047,t:.68}].forEach(({f,t})=>tone('triangle',f,.26,c.currentTime+t,.22));[{f:330,t:.4},{f:440,t:.54},{f:523,t:.68}].forEach(({f,t})=>tone('sine',f,.1,c.currentTime+t,.3));}
function playHabitAllClear(){const c=getCtx();[523,659,784,880,1047].forEach((f,i)=>tone('triangle',f,.23,c.currentTime+i*.1,.22));}
function playBulk(n){
  // 連続チェック音
  const c=getCtx();
  for(let i=0;i<Math.min(n,6);i++){
    const f=660+i*80;tone('sine',f,.13,c.currentTime+i*.07,.12);
  }
}

// ══════════════════════════════════════
// データ
// ══════════════════════════════════════
const MISSION_ITEMS=[
  {label:'ピアノ',icon:'🎹'},{label:'日記',icon:'📔'},{label:'勉強',icon:'📚'},
  {label:'修行',icon:'🥋'},{label:'新体操',icon:'🎀'},{label:'チャレンジタッチ',icon:'📱'},
  {label:'ストレッチ',icon:'🤸'},{label:'Y字バランス10秒',icon:'⭐'},
  {label:'タッチタイピング',icon:'⌨️'},{label:'ゲーム',icon:'🎮'},{label:'読書',icon:'📖'},
];
const HABIT_SECTIONS=[
  {id:'morning',label:'朝のルーティン',cls:'morning',items:[
    {id:'drug1', label:'薬を飲む：シダキュア',        note:'花粉症',icon:'💊'},
    {id:'drug2', label:'薬を飲む：オロパタジン',      note:'花粉症',icon:'💊'},
    {id:'drug3', label:'薬を飲む：フェキソフェナジン',note:'花粉症',icon:'💊'},
    {id:'toilet',label:'トイレ',                      note:'',      icon:'🚽'},
    {id:'dress', label:'着替え',                      note:'スパッツはく',icon:'👗'},
    {id:'wash',  label:'顔を洗う',                    note:'',      icon:'🚿'},
    {id:'moist', label:'保湿液',                      note:'',      icon:'🧴'},
    {id:'sunsc', label:'日焼け止め',                  note:'',      icon:'☀️'},
    {id:'xylit', label:'キシリトール',                note:'',      icon:'🍬'},
    {id:'teeth', label:'歯を磨く',                    note:'',      icon:'🪥'},
  ]},
  {id:'school',label:'学校じゅんび',cls:'school',items:[
    {id:'bottle',label:'水筒',              note:'',              icon:'🧃'},
    {id:'gym',   label:'体操着',            note:'',              icon:'👕'},
    {id:'spats', label:'スパッツ',          note:'体育は短いもの',icon:'🩲'},
    {id:'shirt', label:'半袖シャツ',        note:'体育の日',      icon:'👚'},
    {id:'pocket',label:'移動ポケット',      note:'',              icon:'🎽'},
    {id:'nbook', label:'連絡帳',            note:'',              icon:'📒'},
    {id:'cocof', label:'ここフレ',          note:'',              icon:'📦'},
    {id:'sched', label:'時間割と持ち物確認',note:'学級通信で',    icon:'📅'},
    {id:'lunch', label:'給食確認',          note:'',              icon:'🍱'},
    {id:'cream', label:'ハンドクリーム',    note:'',              icon:'🤲'},
    {id:'mask',  label:'マスク',            note:'',              icon:'😷'},
  ]},
];
const TOTAL_HABITS=HABIT_SECTIONS.reduce((s,sec)=>s+sec.items.length,0);

// ══════════════════════════════════════
// localStorage
// ══════════════════════════════════════
const TODAY=new Date().toISOString().slice(0,10);
function loadJSON(k,def){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(def));}catch{return def;}}
function saveJSON(k,v){localStorage.setItem(k,JSON.stringify(v));}
let mChecked=loadJSON(`m_checked_${TODAY}`,[]);
let mRolls=parseInt(localStorage.getItem(`m_rolls_${TODAY}`)||'0',10);
let hChecked=loadJSON(`h_checked_${TODAY}`,[]);
let mCurrentLabel=null,mRolling=false;
function mRemaining(){return MISSION_ITEMS.filter(it=>!mChecked.includes(it.label));}

// ══════════════════════════════════════
// ── スワイプ（リアルタイム追従 + velocity）──
// ══════════════════════════════════════
let currentTab=0;
const track=document.getElementById('pane-track');
const viewport=document.getElementById('pane-viewport');

function getTabCount(){return 2;}
function paneWidth(){return viewport.clientWidth;}

/* トラックの幅を設定（JS管理） */
function initTrack(){
  if(window.innerWidth>=768)return;
  const w=paneWidth();
  track.style.width=(w*getTabCount())+'px';
  // pane幅
  document.getElementById('pane-mission').style.width=w+'px';
  document.getElementById('pane-habit').style.width=w+'px';
  setTrackX(currentTab*w,false);
}

function setTrackX(x,animate){
  if(animate){
    track.style.transition='transform .35s cubic-bezier(.25,.46,.45,.94)';
  } else {
    track.style.transition='none';
  }
  track.style.transform=`translateX(${-x}px)`;
}

function switchTab(idx,animate=true){
  if(window.innerWidth>=768)return;
  currentTab=idx;
  setTrackX(idx*paneWidth(),animate);
  document.getElementById('tab-mission').classList.toggle('active',idx===0);
  document.getElementById('tab-habit').classList.toggle('active',idx===1);
}

/* タッチ変数 */
let touchStartX=0,touchStartY=0;
let touchCurX=0,touchLastX=0,touchLastT=0;
let touchVelX=0;
let isDragging=false,isDecided=false,isHorizontal=false;
let trackStartOffset=0;

viewport.addEventListener('touchstart',e=>{
  if(window.innerWidth>=768)return;
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
  touchCurX=t.clientX;touchLastX=t.clientX;touchLastT=Date.now();
  touchVelX=0;isDragging=true;isDecided=false;isHorizontal=false;
  trackStartOffset=currentTab*paneWidth();
  track.style.transition='none';
},{passive:true});

viewport.addEventListener('touchmove',e=>{
  if(!isDragging||window.innerWidth>=768)return;
  const t=e.touches[0];
  const dx=t.clientX-touchStartX;
  const dy=t.clientY-touchStartY;

  if(!isDecided){
    if(Math.abs(dx)<5&&Math.abs(dy)<5)return;
    isDecided=true;
    isHorizontal=Math.abs(dx)>Math.abs(dy);
  }
  if(!isHorizontal)return;

  // 水平スクロールを乗っ取る
  e.preventDefault();

  // velocity計算（直近フレームとの差分）
  const now=Date.now();
  const dt=now-touchLastT;
  if(dt>0)touchVelX=(t.clientX-touchLastX)/dt*1000;// px/s
  touchLastX=t.clientX;touchLastT=now;
  touchCurX=t.clientX;

  // トラックをリアルタイム移動（端は rubber-band）
  let offset=trackStartOffset-dx;
  const maxOffset=(getTabCount()-1)*paneWidth();
  if(offset<0){
    offset=offset*0.25;// 左端バウンド
  } else if(offset>maxOffset){
    offset=maxOffset+(offset-maxOffset)*0.25;// 右端バウンド
  }
  track.style.transform=`translateX(${-offset}px)`;
},{passive:false});

viewport.addEventListener('touchend',e=>{
  if(!isDragging||!isHorizontal||window.innerWidth>=768){isDragging=false;return;}
  isDragging=false;
  const dx=touchCurX-touchStartX;
  const w=paneWidth();
  const FLICK_VEL=300;// px/s 以上でフリック判定
  const DRAG_THR=w*0.35;// 35%以上でページ切替

  let next=currentTab;
  if(touchVelX<-FLICK_VEL||dx<-DRAG_THR){
    next=Math.min(currentTab+1,getTabCount()-1);
  } else if(touchVelX>FLICK_VEL||dx>DRAG_THR){
    next=Math.max(currentTab-1,0);
  }
  switchTab(next,true);
},{passive:true});

window.addEventListener('resize',()=>{
  if(window.innerWidth>=768){
    track.style.width='';track.style.transform='';track.style.transition='';
    document.getElementById('pane-mission').style.width='';
    document.getElementById('pane-habit').style.width='';
  } else {
    initTrack();
  }
});
initTrack();

// ══════════════════════════════════════
// ミッション：ドラム
// ══════════════════════════════════════
const REPEATS=6,ITEM_H=96,LOOP_LEN=MISSION_ITEMS.length;
const strip=document.getElementById('strip');
for(let r=0;r<REPEATS;r++) MISSION_ITEMS.forEach(it=>{
  const d=document.createElement('div');d.className='drum-item';
  d.innerHTML=`<span class="drum-icon">${it.icon}</span><span class="drum-label">${it.label}</span>`;
  strip.appendChild(d);
});
let stripIdx=0;
function itemY(i){return -(i*ITEM_H);}
strip.style.transform=`translateY(${itemY(LOOP_LEN*2+stripIdx)}px)`;

// ミッション 進捗・チップ描画
const rollBtn=document.getElementById('roll-btn');
const mCheckBtn=document.getElementById('m-check-btn');
const mAllDone=document.getElementById('m-all-done');
const mProgBar=document.getElementById('m-prog-bar');
const mProgCount=document.getElementById('m-prog-count');
document.getElementById('m-roll-count').textContent=mRolls;

function updateMProgress(){
  const n=mChecked.length,total=MISSION_ITEMS.length;
  mProgCount.textContent=`${n} / ${total} 完了`;
  mProgBar.style.width=(total?n/total*100:0)+'%';
  mProgBar.classList.toggle('full',n>=total);
}
function renderMChips(){
  const chips=document.getElementById('mission-chips');chips.innerHTML='';
  MISSION_ITEMS.forEach(it=>{
    const c=document.createElement('div');const done=mChecked.includes(it.label);
    c.className='m-chip'+(done?' checked':'');
    c.innerHTML=`<span class="m-chip-icon">${it.icon}</span>${it.label}`;
    c.addEventListener('click',()=>toggleMChip(it.label));chips.appendChild(c);
  });
  const allDone=mChecked.length>=MISSION_ITEMS.length;
  mAllDone.classList.toggle('visible',allDone);
  rollBtn.disabled=allDone;
  if(allDone)rollBtn.textContent='🎊 ぜんぶクリア！';
  else if(!mRolling)rollBtn.textContent=mRolls>0?'🎲 もういちど！':'🎲 まわす！';
  updateMProgress();
}
renderMChips();

function toggleMChip(label){
  if(mRolling)return;
  const i=mChecked.indexOf(label);
  if(i===-1){mChecked.push(label);playMCheck();launchConfetti(16);
    if(label===mCurrentLabel){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
  } else {
    mChecked.splice(i,1);
    if(label===mCurrentLabel){mCheckBtn.classList.remove('done');mCheckBtn.textContent='✅ おわった！';mCheckBtn.disabled=false;}
  }
  saveJSON(`m_checked_${TODAY}`,mChecked);renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(80);},200);
}

function startRoll(){
  if(mRolling)return;const pool=mRemaining();if(!pool.length)return;
  mRolling=true;rollBtn.disabled=true;rollBtn.textContent='🌀 まわってるよ…';
  mCheckBtn.classList.remove('visible','done');mCheckBtn.disabled=false;mCheckBtn.textContent='✅ おわった！';
  playStart();
  const chosen=pool[Math.floor(Math.random()*pool.length)];
  const nextIdx=MISSION_ITEMS.indexOf(chosen);
  const finalIdx=LOOP_LEN*3+nextIdx+LOOP_LEN*2;
  const sy=itemY(LOOP_LEN*2+stripIdx),dist=itemY(finalIdx)-sy;
  const DUR=3200,st=performance.now();let lastY=sy,landOk=true;
  function eob(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
  function ease(t){return t<.35?(t/.35)*(t/.35)*.35:eob(t);}
  function tick(now){
    const t=Math.min((now-st)/DUR,1),y=sy+dist*ease(t);
    strip.style.transform=`translateY(${y}px)`;
    if(Math.abs(y-lastY)>=ITEM_H){playRollTick(Math.min(t*1.5,1));lastY=y;}
    if(t>.88&&landOk){playLand();landOk=false;}
    if(t<1){requestAnimationFrame(tick);return;}
    stripIdx=nextIdx;strip.style.transition='none';
    strip.style.transform=`translateY(${itemY(LOOP_LEN*2+nextIdx)}px)`;
    mCurrentLabel=chosen.label;playFanfare();launchConfetti();
    const alreadyDone=mChecked.includes(mCurrentLabel);
    mCheckBtn.classList.add('visible');
    if(alreadyDone){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
    mRolls++;document.getElementById('m-roll-count').textContent=mRolls;localStorage.setItem(`m_rolls_${TODAY}`,mRolls);
    rollBtn.textContent='🎲 もういちど！';rollBtn.disabled=false;mRolling=false;
  }
  requestAnimationFrame(tick);
}
function checkMission(){
  if(!mCurrentLabel||mChecked.includes(mCurrentLabel))return;
  mChecked.push(mCurrentLabel);saveJSON(`m_checked_${TODAY}`,mChecked);
  playMCheck();launchConfetti(20);
  mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;
  renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(80);},200);
}
function resetMission(){
  if(!confirm('ミッションのチェックをリセットするよ？'))return;
  mChecked=[];saveJSON(`m_checked_${TODAY}`,[]);mCurrentLabel=null;
  mCheckBtn.classList.remove('visible','done');rollBtn.disabled=false;rollBtn.textContent='🎲 まわす！';
  renderMChips();
}

// ══════════════════════════════════════
// 習慣：描画
// ══════════════════════════════════════
const hProgBar=document.getElementById('h-prog-bar');
const hProgCount=document.getElementById('h-prog-count');
const hAllDone=document.getElementById('h-all-done');

function updateHProgress(){
  const n=hChecked.length;
  hProgCount.textContent=`${n} / ${TOTAL_HABITS} 完了`;
  hProgBar.style.width=(TOTAL_HABITS?n/TOTAL_HABITS*100:0)+'%';
  hProgBar.classList.toggle('full',n>=TOTAL_HABITS);
  hAllDone.classList.toggle('visible',n>=TOTAL_HABITS);
}
function renderHabits(){
  HABIT_SECTIONS.forEach(sec=>{
    const list=document.getElementById(`habit-list-${sec.id}`);list.innerHTML='';
    const allChecked=sec.items.every(it=>hChecked.includes(it.id));
    // 一括ボタンの状態切替
    const bulkBtn=document.getElementById(`bulk-${sec.id}`);
    if(allChecked){
      bulkBtn.textContent='チェックを外す';bulkBtn.className='bulk-btn uncheck-all';
      bulkBtn.onclick=()=>bulkUncheck(sec.id);
    } else {
      bulkBtn.textContent='まとめてチェック';bulkBtn.className='bulk-btn check-all';
      bulkBtn.onclick=()=>bulkCheck(sec.id);
    }
    sec.items.forEach(item=>{
      const done=hChecked.includes(item.id);
      const el=document.createElement('div');el.className='habit-item'+(done?' checked':'');
      el.innerHTML=`
        <div class="habit-check-box"><span class="habit-check-mark">✓</span></div>
        <span style="font-size:1rem;flex-shrink:0">${item.icon}</span>
        <span class="habit-label">${item.label}</span>
        ${item.note?`<span class="habit-note">${item.note}</span>`:''}
      `;
      el.addEventListener('click',()=>toggleHabit(item.id));
      list.appendChild(el);
    });
  });
  updateHProgress();
}
renderHabits();

function toggleHabit(id){
  const wasAll=hChecked.length>=TOTAL_HABITS;
  const i=hChecked.indexOf(id);
  if(i===-1){hChecked.push(id);playHabitCheck();launchConfetti(8,'#7ee8c8');}
  else{hChecked.splice(i,1);playHabitUncheck();}
  saveJSON(`h_checked_${TODAY}`,hChecked);renderHabits();
  if(!wasAll&&hChecked.length>=TOTAL_HABITS)setTimeout(()=>{playHabitAllClear();launchConfetti(65);},200);
}

// 一括チェック
function bulkCheck(secId){
  const sec=HABIT_SECTIONS.find(s=>s.id===secId);if(!sec)return;
  const wasAll=hChecked.length>=TOTAL_HABITS;
  const newItems=sec.items.filter(it=>!hChecked.includes(it.id));
  newItems.forEach(it=>hChecked.push(it.id));
  saveJSON(`h_checked_${TODAY}`,hChecked);
  if(newItems.length){playBulk(newItems.length);launchConfetti(20,'#7ee8c8');}
  renderHabits();
  if(!wasAll&&hChecked.length>=TOTAL_HABITS)setTimeout(()=>{playHabitAllClear();launchConfetti(65);},200);
}
// 一括解除
function bulkUncheck(secId){
  const sec=HABIT_SECTIONS.find(s=>s.id===secId);if(!sec)return;
  const ids=sec.items.map(it=>it.id);
  hChecked=hChecked.filter(id=>!ids.includes(id));
  saveJSON(`h_checked_${TODAY}`,hChecked);renderHabits();
}

function resetHabit(){
  if(!confirm('習慣チェックをリセットするよ？'))return;
  hChecked=[];saveJSON(`h_checked_${TODAY}`,[]);renderHabits();
}

// ══════════════════════════════════════
// confetti
// ══════════════════════════════════════
const COLORS=['#ff7eb3','#ffb3d1','#c97ef7','#ffe066','#7ee8c8','#ff9de2','#74b9ff'];
function launchConfetti(n=55,extra){
  const colors=extra?[extra,...COLORS]:COLORS;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*20}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.2+Math.random()*.9}s;animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

// 浮かぶ星
['⭐','✨','💫','🌸','💕','🎀'].forEach(e=>{
  for(let j=0;j<3;j++){
    const s=document.createElement('div');s.className='star';s.textContent=e;
    s.style.cssText=`left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*12}s;font-size:${.9+Math.random()*.9}rem;`;
    document.getElementById('stars').appendChild(s);
  }
});

document.addEventListener('keydown',e=>{if(e.code==='Space'&&currentTab===0){e.preventDefault();startRoll();}});
