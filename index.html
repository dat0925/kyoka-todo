<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>✨ きょうのミッション ✨</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ミッション"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="theme-color" content="#ff7eb3"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#ff7eb3;--pink2:#ffb3d1;--purple:#c97ef7;
  --yellow:#ffe066;--mint:#7ee8c8;--bg:#fff0f8;
  --blue:#74b9ff;--orange:#fdcb6e;
}
*{margin:0;padding:0;box-sizing:border-box;}

/* ═══ レイアウト基盤 ═══ */
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);min-height:100vh;
  overflow-x:hidden;position:relative;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;animation:floatStar linear infinite;opacity:.5;}
@keyframes floatStar{
  0%  {transform:translateY(110vh) rotate(0deg);  opacity:0;}
  10% {opacity:.5;}90%{opacity:.5;}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

/* ═══ アプリシェル ═══ */
#app{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
}

/* ─── タブバー（スマホ / タブレット縦） ─── */
.tab-bar{
  display:flex;
  position:sticky;top:0;z-index:50;
  background:#fff;
  border-bottom:3px solid var(--pink2);
  box-shadow:0 2px 12px rgba(255,126,179,.15);
}
.tab-btn{
  flex:1;padding:14px 8px 12px;
  border:none;background:transparent;
  font-family:'Noto Sans JP',sans-serif;
  font-size:.85rem;font-weight:700;letter-spacing:.06em;
  color:#c097d0;cursor:pointer;
  border-bottom:3px solid transparent;
  margin-bottom:-3px;
  transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tab-btn .tab-icon{font-size:1.3rem;}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink);}
.tab-btn:hover:not(.active){color:var(--purple);}

/* ─── メインコンテンツ（スワイプ可能ラッパー） ─── */
.pane-wrapper{
  flex:1;
  display:flex;
  overflow:hidden;/* 横スクロールは内部で処理 */
  position:relative;
}
.pane-track{
  display:flex;
  width:200%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.pane{
  width:50%;/* pane-track の半分 = 実質100vw */
  overflow-y:auto;
  padding:20px 0 60px;
  display:flex;flex-direction:column;align-items:center;
}

/* ═══ PC / iPad 横並びレイアウト ═══ */
@media(min-width:768px){
  .tab-bar{display:none;}
  .pane-wrapper{overflow:visible;}
  .pane-track{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:24px 24px 40px;
    transform:none!important;/* PC では transform 無効 */
  }
  .pane{
    width:100%;
    overflow-y:visible;
    padding:0;
  }
}

/* ═══ カード共通 ═══ */
.card{
  background:#fff;border-radius:32px;
  padding:22px 20px;
  width:min(440px,92vw);
  box-shadow:0 6px 32px rgba(255,126,179,.15);
  border:3px solid var(--pink2);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
@media(min-width:768px){
  .card{width:100%;border-radius:28px;}
}

/* ─── タイトル ─── */
.card-title{font-size:1.1rem;font-weight:900;color:var(--purple);letter-spacing:.1em;}
.card-title span{color:var(--pink);}

/* ─── 進捗バー ─── */
.progress-wrap{width:100%;}
.progress-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.78rem;font-weight:700;margin-bottom:6px;
}
.progress-label .prog-text{color:var(--purple);}
.progress-label .prog-count{color:var(--pink);font-size:.9rem;}
.progress-bar-bg{
  width:100%;height:12px;border-radius:99px;
  background:#f0e0f8;overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 8px rgba(255,126,179,.3);
}
.progress-bar-fill.full{
  background:linear-gradient(90deg,var(--mint),#38d39f);
  box-shadow:0 2px 8px rgba(126,232,200,.4);
}

/* ═══ ミッションタブ ═══ */
.drum-wrap{width:100%;display:flex;flex-direction:column;align-items:center;}
.pointer{
  width:0;height:0;
  border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:22px solid var(--purple);
  filter:drop-shadow(0 2px 4px rgba(201,126,247,.5));
  margin-bottom:-3px;z-index:3;position:relative;
}
.drum-window{
  width:100%;height:100px;border-radius:20px;
  border:4px solid var(--pink);
  background:linear-gradient(135deg,#fff5fb,#fce4f6);
  overflow:hidden;position:relative;
  box-shadow:0 4px 20px rgba(255,126,179,.15),inset 0 2px 6px rgba(255,255,255,.8);
}
.drum-window::before,.drum-window::after{
  content:'';position:absolute;left:0;right:0;height:26px;z-index:2;pointer-events:none;
}
.drum-window::before{top:0;background:linear-gradient(to bottom,rgba(255,245,251,.95),transparent);}
.drum-window::after{bottom:0;background:linear-gradient(to top,rgba(252,228,246,.95),transparent);}
.highlight-bar{
  position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:52px;
  background:linear-gradient(90deg,rgba(255,224,102,.3),rgba(255,126,179,.15),rgba(255,224,102,.3));
  border-top:2px dashed var(--yellow);border-bottom:2px dashed var(--yellow);
  z-index:1;pointer-events:none;
}
.drum-strip{
  display:flex;flex-direction:column;align-items:center;
  position:absolute;left:0;right:0;top:0;will-change:transform;
}
.drum-item{
  height:100px;width:100%;
  display:flex;align-items:center;justify-content:center;gap:10px;
  flex-shrink:0;padding:0 14px;
}
.drum-icon{font-size:1.9rem;line-height:1;flex-shrink:0;}
.drum-label{
  font-size:clamp(.95rem,3.8vw,1.6rem);font-weight:900;
  color:#e060a0;letter-spacing:.08em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ─── ボタン行 ─── */
.btn-row{width:100%;display:flex;gap:10px;align-items:stretch;}
#roll-btn{
  flex:1;padding:13px 10px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;font-family:'Noto Sans JP',sans-serif;
  font-size:1rem;font-weight:900;letter-spacing:.15em;
  cursor:pointer;box-shadow:0 5px 18px rgba(255,126,179,.4);
  transition:transform .15s,box-shadow .15s;
}
#roll-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,126,179,.5);}
#roll-btn:active:not(:disabled){transform:scale(.97);}
#roll-btn:disabled{opacity:.6;cursor:not-allowed;}
#m-check-btn{
  flex:0 0 auto;padding:13px 16px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--mint),#5ec8f0);
  color:#fff;font-family:'Noto Sans JP',sans-serif;
  font-size:.9rem;font-weight:900;letter-spacing:.08em;
  cursor:pointer;box-shadow:0 4px 14px rgba(94,200,240,.35);
  transition:transform .15s,box-shadow .15s,max-width .25s,opacity .25s,padding .25s;
  white-space:nowrap;max-width:0;overflow:hidden;
  padding-left:0;padding-right:0;opacity:0;pointer-events:none;
}
#m-check-btn.visible{max-width:160px;padding-left:16px;padding-right:16px;opacity:1;pointer-events:auto;}
#m-check-btn:hover{transform:translateY(-2px);}
#m-check-btn:active{transform:scale(.97);}
#m-check-btn.done{background:linear-gradient(135deg,#b2e8d8,#a0d8ee);box-shadow:none;cursor:default;opacity:.7;}

/* ─── ミッションチップ ─── */
.mission-list-title{font-size:.7rem;font-weight:700;color:#c097d0;letter-spacing:.1em;margin-bottom:7px;text-align:center;}
.mission-chips{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px;width:100%;
}
.m-chip{
  display:flex;align-items:center;gap:5px;
  padding:6px 10px;border-radius:14px;
  font-size:.76rem;font-weight:700;letter-spacing:.02em;
  border:2px solid var(--pink2);color:#d070a8;background:#fff5fb;
  transition:all .2s;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.m-chip:hover{border-color:var(--pink);background:#ffe8f5;transform:scale(1.04);}
.m-chip:active{transform:scale(.96);}
.m-chip.checked{
  background:linear-gradient(135deg,#e8faf4,#d4f4ea);
  border-color:var(--mint);color:#2a9e7a;text-decoration:line-through;opacity:.72;
}
.m-chip-icon{font-size:.9rem;flex-shrink:0;}

/* ─── 全完了バナー ─── */
.all-done-banner{
  display:none;width:100%;border-radius:16px;padding:11px;
  background:linear-gradient(135deg,#fff8e1,#fff3e0);
  border:2.5px solid var(--yellow);
  text-align:center;font-size:.88rem;font-weight:900;color:#e0900a;
}
.all-done-banner.visible{display:block;}

/* ─── 下部行 ─── */
.bottom-row{
  display:flex;align-items:center;justify-content:space-between;width:100%;
}
.count-row{font-size:.68rem;color:#c097d0;letter-spacing:.06em;}
.count-row b{color:var(--pink);}
.reset-btn{
  font-size:.66rem;color:#c097d0;background:none;
  border:1px solid #e8d0f0;border-radius:10px;
  padding:3px 9px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s;
}
.reset-btn:hover{background:#fff0fb;color:var(--purple);border-color:var(--purple);}

/* ═══ 習慣タブ ═══ */
.habit-section{width:100%;margin-bottom:4px;}
.section-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:14px;
  font-size:.82rem;font-weight:900;letter-spacing:.08em;
  margin-bottom:8px;
}
.section-header.morning{background:linear-gradient(135deg,#fff3cd,#ffe8a0);color:#b8860b;}
.section-header.school{background:linear-gradient(135deg,#d4eeff,#b3daff);color:#1a6fa8;}
.section-icon{font-size:1.1rem;}

.habit-list{display:flex;flex-direction:column;gap:5px;width:100%;}
.habit-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:14px;
  background:#fff;border:2px solid #f0e0f8;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:all .2s;
}
.habit-item:hover{border-color:var(--pink2);background:#fff5fb;transform:translateX(3px);}
.habit-item:active{transform:scale(.98);}
.habit-item.checked{
  background:linear-gradient(135deg,#f0faf6,#e4f8f0);
  border-color:var(--mint);
}
.habit-check-box{
  width:26px;height:26px;flex-shrink:0;
  border-radius:8px;border:2.5px solid var(--pink2);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;background:#fff;
}
.habit-item.checked .habit-check-box{
  background:linear-gradient(135deg,var(--mint),#38d39f);
  border-color:var(--mint);
}
.habit-check-mark{
  font-size:1rem;color:#fff;opacity:0;transform:scale(.5);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.habit-item.checked .habit-check-mark{opacity:1;transform:scale(1);}
.habit-label{flex:1;font-size:.85rem;font-weight:700;color:#555;letter-spacing:.03em;}
.habit-item.checked .habit-label{color:#2a9e7a;text-decoration:line-through;opacity:.8;}
.habit-note{font-size:.68rem;color:#aaa;white-space:nowrap;}
.habit-item.checked .habit-note{color:var(--mint);}

/* ─── 習慣 リセット ─── */
.habit-bottom{
  display:flex;align-items:center;justify-content:flex-end;width:100%;margin-top:2px;
}

/* ═══ confetti ═══ */
.confetti-piece{
  position:fixed;border-radius:2px;pointer-events:none;z-index:200;
  animation:confettiFall 1.6s ease-in forwards;
}
@keyframes confettiFall{
  0%  {transform:translateY(-20px) rotate(0deg);  opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="app">

  <!-- ── タブバー（スマホ） ── -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-mission" onclick="switchTab(0)">
      <span class="tab-icon">🎲</span>ミッション
    </button>
    <button class="tab-btn" id="tab-habit" onclick="switchTab(1)">
      <span class="tab-icon">✅</span>習慣チェック
    </button>
  </div>

  <!-- ── ペイン（スワイプ / PC横並び） ── -->
  <div class="pane-wrapper" id="pane-wrapper">
    <div class="pane-track" id="pane-track">

      <!-- ══════ ミッションペイン ══════ -->
      <div class="pane" id="pane-mission">
        <div class="card">
          <div class="card-title">✨ きょうの <span>ミッション</span> ✨</div>

          <!-- 進捗 -->
          <div class="progress-wrap">
            <div class="progress-label">
              <span class="prog-text">📋 ミッション進捗</span>
              <span class="prog-count" id="m-prog-count">0 / 11 完了</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="m-prog-bar" style="width:0%"></div>
            </div>
          </div>

          <!-- ドラム -->
          <div class="drum-wrap">
            <div class="pointer"></div>
            <div class="drum-window">
              <div class="highlight-bar"></div>
              <div class="drum-strip" id="strip"></div>
            </div>
          </div>

          <!-- ボタン -->
          <div class="btn-row">
            <button id="roll-btn" onclick="startRoll()">🎲 まわす！</button>
            <button id="m-check-btn" onclick="checkMission()">✅ おわった！</button>
          </div>

          <!-- 全完了 -->
          <div class="all-done-banner" id="m-all-done">🎊 ミッション ぜんぶ クリア！すごい！🎊</div>

          <!-- ミッションリスト -->
          <div style="width:100%">
            <div class="mission-list-title">📋 タップしてもチェックできるよ！</div>
            <div class="mission-chips" id="mission-chips"></div>
          </div>

          <div class="bottom-row">
            <div class="count-row">まわした回数 <b id="m-roll-count">0</b> かい</div>
            <button class="reset-btn" onclick="resetMission()">🔄 リセット</button>
          </div>
        </div>
      </div><!-- /pane-mission -->

      <!-- ══════ 習慣ペイン ══════ -->
      <div class="pane" id="pane-habit">
        <div class="card">
          <div class="card-title">🌟 きょうの <span>習慣チェック</span></div>

          <!-- 進捗 -->
          <div class="progress-wrap">
            <div class="progress-label">
              <span class="prog-text">✅ 習慣進捗</span>
              <span class="prog-count" id="h-prog-count">0 / 20 完了</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="h-prog-bar" style="width:0%"></div>
            </div>
          </div>

          <!-- 全完了 -->
          <div class="all-done-banner" id="h-all-done">🌈 けさのルーティン ぜんぶ できたよ！えらい！🌈</div>

          <!-- 【朝】セクション -->
          <div class="habit-section">
            <div class="section-header morning">
              <span class="section-icon">🌅</span>朝のルーティン
            </div>
            <div class="habit-list" id="habit-list-morning"></div>
          </div>

          <!-- 【学校準備】セクション -->
          <div class="habit-section">
            <div class="section-header school">
              <span class="section-icon">🎒</span>学校じゅんび
            </div>
            <div class="habit-list" id="habit-list-school"></div>
          </div>

          <div class="habit-bottom">
            <button class="reset-btn" onclick="resetHabit()">🔄 リセット</button>
          </div>
        </div>
      </div><!-- /pane-habit -->

    </div><!-- /pane-track -->
  </div><!-- /pane-wrapper -->

</div><!-- /app -->

<script>
// ══════════════════════════════════════════
// 効果音
// ══════════════════════════════════════════
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(type,freq,vol,start,dur,ctx){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+.02);
  g.gain.exponentialRampToValueAtTime(.001,start+dur);
  o.start(start);o.stop(start+dur+.01);
}
function playStart(){const ctx=getCtx();[440,550,660].forEach((f,i)=>tone('triangle',f,.2,ctx.currentTime+i*.07,.15,ctx));}
function playRollTick(spd){const ctx=getCtx();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.value=500+spd*800;g.gain.setValueAtTime(.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.04);o.start(ctx.currentTime);o.stop(ctx.currentTime+.04);}
function playLand(){const ctx=getCtx();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(200,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+.3);g.gain.setValueAtTime(.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);o.start(ctx.currentTime);o.stop(ctx.currentTime+.4);}
function playFanfare(){const ctx=getCtx();[{f:523,t:0},{f:659,t:.12},{f:784,t:.24},{f:1047,t:.36}].forEach(({f,t})=>tone('triangle',f,.22,ctx.currentTime+t,.2,ctx));}
// 習慣チェック音：軽いポン
function playHabitCheck(){
  const ctx=getCtx();
  tone('sine',660,.18,ctx.currentTime,.12,ctx);
  tone('sine',880,.14,ctx.currentTime+.06,.1,ctx);
}
// 習慣チェック解除音
function playHabitUncheck(){const ctx=getCtx();tone('sine',440,.1,ctx.currentTime,.1,ctx);}
// ミッションチェック音
function playMCheck(){const ctx=getCtx();[{f:880,t:0},{f:1100,t:.08},{f:1320,t:.16}].forEach(({f,t})=>tone('sine',f,.22,ctx.currentTime+t,.22,ctx));}
// 全クリア：豪華メロディー
function playAllClear(){
  const ctx=getCtx();
  // 主旋律
  [{f:523,t:0},{f:659,t:.13},{f:784,t:.26},{f:1047,t:.4},{f:784,t:.54},{f:1047,t:.68}]
    .forEach(({f,t})=>tone('triangle',f,.28,ctx.currentTime+t,.22,ctx));
  // ハーモニー
  [{f:330,t:.4},{f:440,t:.54},{f:523,t:.68}]
    .forEach(({f,t})=>tone('sine',f,.12,ctx.currentTime+t,.3,ctx));
}
// 習慣全クリア
function playHabitAllClear(){
  const ctx=getCtx();
  [{f:523,t:0},{f:659,t:.1},{f:784,t:.2},{f:880,t:.3},{f:1047,t:.42}]
    .forEach(({f,t})=>tone('triangle',f,.25,ctx.currentTime+t,.25,ctx));
}

// ══════════════════════════════════════════
// データ定義
// ══════════════════════════════════════════
const MISSION_ITEMS=[
  {label:'ピアノ',          icon:'🎹'},
  {label:'日記',            icon:'📔'},
  {label:'勉強',            icon:'📚'},
  {label:'修行',            icon:'🥋'},
  {label:'新体操',          icon:'🎀'},
  {label:'チャレンジタッチ', icon:'📱'},
  {label:'ストレッチ',       icon:'🤸'},
  {label:'Y字バランス10秒', icon:'⭐'},
  {label:'タッチタイピング', icon:'⌨️'},
  {label:'ゲーム',          icon:'🎮'},
  {label:'読書',            icon:'📖'},
];

const HABIT_SECTIONS=[
  {
    id:'morning', label:'朝のルーティン',
    items:[
      {id:'drug1',  label:'薬を飲む：シダキュア',       note:'花粉症', icon:'💊'},
      {id:'drug2',  label:'薬を飲む：オロパタジン',     note:'花粉症', icon:'💊'},
      {id:'drug3',  label:'薬を飲む：フェキソフェナジン',note:'花粉症', icon:'💊'},
      {id:'toilet', label:'トイレ',                     note:'',       icon:'🚽'},

// ══════════════════════════════════════════
// localStorage
// ══════════════════════════════════════════
const TODAY=new Date().toISOString().slice(0,10);
const MK_CHK=`m_checked_${TODAY}`;
const MK_ROL=`m_rolls_${TODAY}`;
const HK_CHK=`h_checked_${TODAY}`;
function loadJSON(k,def){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(def));}catch{return def;}}
function saveJSON(k,v){localStorage.setItem(k,JSON.stringify(v));}

let mChecked=loadJSON(MK_CHK,[]);
let mRolls=parseInt(localStorage.getItem(MK_ROL)||'0',10);
let hChecked=loadJSON(HK_CHK,[]);
let mCurrentLabel=null;
let mRolling=false;

const TOTAL_HABITS=HABIT_SECTIONS.reduce((s,sec)=>s+sec.items.length,0);
function mRemaining(){return MISSION_ITEMS.filter(it=>!mChecked.includes(it.label));}

// ══════════════════════════════════════════
// タブ切替 & スワイプ
// ══════════════════════════════════════════
let currentTab=0;
const track=document.getElementById('pane-track');

function switchTab(idx,animate=true){
  currentTab=idx;
  // PC（768px+）は transform 不要
  if(window.innerWidth<768){
    track.style.transition=animate?'transform .3s cubic-bezier(.4,0,.2,1)':'none';
    track.style.transform=`translateX(${idx===0?'0':'-50%'})`;
  }
  document.getElementById('tab-mission').classList.toggle('active',idx===0);
  document.getElementById('tab-habit').classList.toggle('active',idx===1);
}

// タッチスワイプ
let swipeStartX=0,swipeStartY=0,swiping=false;
const wrapper=document.getElementById('pane-wrapper');
wrapper.addEventListener('touchstart',e=>{
  if(window.innerWidth>=768)return;
  swipeStartX=e.touches[0].clientX;
  swipeStartY=e.touches[0].clientY;
  swiping=true;
},{passive:true});
wrapper.addEventListener('touchend',e=>{
  if(!swiping||window.innerWidth>=768)return;
  const dx=e.changedTouches[0].clientX-swipeStartX;
  const dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx<0&&currentTab===0)switchTab(1);
    else if(dx>0&&currentTab===1)switchTab(0);
  }
  swiping=false;
},{passive:true});

window.addEventListener('resize',()=>{
  if(window.innerWidth>=768){
    track.style.transform='';
    track.style.transition='';
  } else {
    switchTab(currentTab,false);
  }
});

// ══════════════════════════════════════════
// ミッション：ドラム構築
// ══════════════════════════════════════════
const REPEATS=6,ITEM_H=100,LOOP_LEN=MISSION_ITEMS.length;
const strip=document.getElementById('strip');
for(let r=0;r<REPEATS;r++) MISSION_ITEMS.forEach(it=>{
  const d=document.createElement('div');d.className='drum-item';
  d.innerHTML=`<span class="drum-icon">${it.icon}</span><span class="drum-label">${it.label}</span>`;
  strip.appendChild(d);
});
let stripIdx=0;
function itemY(i){return -(i*ITEM_H);}
strip.style.transform=`translateY(${itemY(LOOP_LEN*2+stripIdx)}px)`;

// ══════════════════════════════════════════
// ミッション：進捗＆リスト描画
// ══════════════════════════════════════════
const rollBtn=document.getElementById('roll-btn');
const mCheckBtn=document.getElementById('m-check-btn');
const mAllDone=document.getElementById('m-all-done');
const mProgBar=document.getElementById('m-prog-bar');
const mProgCount=document.getElementById('m-prog-count');
const mRollCountEl=document.getElementById('m-roll-count');
mRollCountEl.textContent=mRolls;

function updateMProgress(){
  const n=mChecked.length,total=MISSION_ITEMS.length;
  mProgCount.textContent=`${n} / ${total} 完了`;
  const pct=total?n/total*100:0;
  mProgBar.style.width=pct+'%';
  mProgBar.classList.toggle('full',n>=total);
}

function renderMChips(){
  const chips=document.getElementById('mission-chips');
  chips.innerHTML='';
  MISSION_ITEMS.forEach(it=>{
    const c=document.createElement('div');
    const done=mChecked.includes(it.label);
    c.className='m-chip'+(done?' checked':'');
    c.innerHTML=`<span class="m-chip-icon">${it.icon}</span>${it.label}`;
    c.addEventListener('click',()=>toggleMChip(it.label));
    chips.appendChild(c);
  });
  const allDone=mChecked.length>=MISSION_ITEMS.length;
  mAllDone.classList.toggle('visible',allDone);
  rollBtn.disabled=allDone;
  if(allDone)rollBtn.textContent='🎊 ぜんぶクリア！';
  else if(!mRolling)rollBtn.textContent=mRolls>0?'🎲 もういちど！':'🎲 まわす！';
  updateMProgress();
}
renderMChips();

function toggleMChip(label){
  if(mRolling)return;
  const i=mChecked.indexOf(label);
  if(i===-1){
    mChecked.push(label);playMCheck();launchConfetti(16);
    if(label===mCurrentLabel){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
  } else {
    mChecked.splice(i,1);
    if(label===mCurrentLabel){mCheckBtn.classList.remove('done');mCheckBtn.textContent='✅ おわった！';mCheckBtn.disabled=false;}
  }
  saveJSON(MK_CHK,mChecked);
  renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(80);},200);
}

// ══════════════════════════════════════════
// ミッション：ロール
// ══════════════════════════════════════════
function startRoll(){
  if(mRolling)return;
  const pool=mRemaining();
  if(!pool.length)return;
  mRolling=true;rollBtn.disabled=true;rollBtn.textContent='🌀 まわってるよ…';
  mCheckBtn.classList.remove('visible','done');mCheckBtn.disabled=false;mCheckBtn.textContent='✅ おわった！';
  playStart();
  const chosen=pool[Math.floor(Math.random()*pool.length)];
  const nextIdx=MISSION_ITEMS.indexOf(chosen);
  const finalIdx=LOOP_LEN*3+nextIdx+LOOP_LEN*2;
  const sy=itemY(LOOP_LEN*2+stripIdx),ey=itemY(finalIdx),dist=ey-sy;
  const DUR=3200,st=performance.now();
  let lastY=sy,landOk=true;
  function eob(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
  function ease(t){return t<.35?(t/.35)*(t/.35)*.35:eob(t);}
  function tick(now){
    const t=Math.min((now-st)/DUR,1),y=sy+dist*ease(t);
    strip.style.transform=`translateY(${y}px)`;
    if(Math.abs(y-lastY)>=ITEM_H){playRollTick(Math.min(t*1.5,1));lastY=y;}
    if(t>.88&&landOk){playLand();landOk=false;}
    if(t<1){requestAnimationFrame(tick);return;}
    stripIdx=nextIdx;
    strip.style.transition='none';
    strip.style.transform=`translateY(${itemY(LOOP_LEN*2+nextIdx)}px)`;
    mCurrentLabel=chosen.label;
    playFanfare();launchConfetti();
    const alreadyDone=mChecked.includes(mCurrentLabel);
    mCheckBtn.classList.add('visible');
    if(alreadyDone){mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;}
    mRolls++;mRollCountEl.textContent=mRolls;localStorage.setItem(MK_ROL,mRolls);
    rollBtn.textContent='🎲 もういちど！';rollBtn.disabled=false;mRolling=false;
  }
  requestAnimationFrame(tick);
}

function checkMission(){
  if(!mCurrentLabel||mChecked.includes(mCurrentLabel))return;
  mChecked.push(mCurrentLabel);saveJSON(MK_CHK,mChecked);
  playMCheck();launchConfetti(20);
  mCheckBtn.classList.add('done');mCheckBtn.textContent='✔ チェック済み！';mCheckBtn.disabled=true;
  renderMChips();
  if(mChecked.length>=MISSION_ITEMS.length)setTimeout(()=>{playAllClear();launchConfetti(80);},200);
}

function resetMission(){
  if(!confirm('ミッションのチェックをリセットするよ？'))return;
  mChecked=[];saveJSON(MK_CHK,[]);mCurrentLabel=null;
  mCheckBtn.classList.remove('visible','done');
  rollBtn.disabled=false;rollBtn.textContent='🎲 まわす！';
  renderMChips();
}

// ══════════════════════════════════════════
// 習慣：描画
// ══════════════════════════════════════════
const hProgBar=document.getElementById('h-prog-bar');
const hProgCount=document.getElementById('h-prog-count');
const hAllDone=document.getElementById('h-all-done');

function updateHProgress(){
  const n=hChecked.length;
  hProgCount.textContent=`${n} / ${TOTAL_HABITS} 完了`;
  const pct=TOTAL_HABITS?n/TOTAL_HABITS*100:0;
  hProgBar.style.width=pct+'%';
  hProgBar.classList.toggle('full',n>=TOTAL_HABITS);
  hAllDone.classList.toggle('visible',n>=TOTAL_HABITS);
}

function renderHabits(){
  HABIT_SECTIONS.forEach(sec=>{
    const list=document.getElementById(`habit-list-${sec.id}`);
    list.innerHTML='';
    sec.items.forEach(item=>{
      const done=hChecked.includes(item.id);
      const el=document.createElement('div');
      el.className='habit-item'+(done?' checked':'');
      el.innerHTML=`
        <div class="habit-check-box"><span class="habit-check-mark">✓</span></div>
        <span style="font-size:1.1rem;flex-shrink:0">${item.icon}</span>
        <span class="habit-label">${item.label}</span>
        ${item.note?`<span class="habit-note">${item.note}</span>`:''}
      `;
      el.addEventListener('click',()=>toggleHabit(item.id));
      list.appendChild(el);
    });
  });
  updateHProgress();
}
renderHabits();

function toggleHabit(id){
  const i=hChecked.indexOf(id);
  const wasAll=hChecked.length>=TOTAL_HABITS;
  if(i===-1){
    hChecked.push(id);
    playHabitCheck();
    launchConfetti(10,'#7ee8c8');
  } else {
    hChecked.splice(i,1);
    playHabitUncheck();
  }
  saveJSON(HK_CHK,hChecked);
  renderHabits();
  if(!wasAll&&hChecked.length>=TOTAL_HABITS){
    setTimeout(()=>{playHabitAllClear();launchConfetti(70);},200);
  }
}

function resetHabit(){
  if(!confirm('習慣チェックをリセットするよ？'))return;
  hChecked=[];saveJSON(HK_CHK,[]);
  renderHabits();
}

// ══════════════════════════════════════════
// confetti
// ══════════════════════════════════════════
const COLORS=['#ff7eb3','#ffb3d1','#c97ef7','#ffe066','#7ee8c8','#ff9de2','#74b9ff'];
function launchConfetti(n=55,extra){
  const colors=extra?[extra,...COLORS]:COLORS;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*20}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.2+Math.random()*.9}s;animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

    document.getElementById('stars').appendChild(s);

});

document.addEventListener('keydown',e=>{if(e.code==='Space'&&currentTab===0){e.preventDefault();startRoll();}});
